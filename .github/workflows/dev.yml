name: Deploy to VPS (dev)

on:
  push:
    branches:
      - dev

jobs:
  deploy_server:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e  # Arrête le script à la première erreur

            BASE_DIR="/home/debian"
            REPO_DIR="$BASE_DIR/tacticx-dev"
            COMPOSE_ARGS="-f docker-compose.dev.yml -p tacticx-dev"

            mkdir -p "$BASE_DIR"

            # Vérifier si le dépôt existe, sinon le cloner (branche dev)
            if [ ! -d "$REPO_DIR/.git" ]; then
                echo "📦 Premier déploiement - Clonage du dépôt..."
                cd "$BASE_DIR"

                if [ -d "tacticx-dev" ]; then
                    echo "  Dossier existant trouvé, sauvegarde..."
                    mv tacticx-dev tacticx-dev.backup.$(date +%Y%m%d_%H%M%S)
                fi

                git clone --branch dev --single-branch git@github.com:biga971/tacticx.git "tacticx-dev"
                cd "$REPO_DIR"
            else
                echo " Dépôt existant trouvé"
                cd "$REPO_DIR"

                echo " Arrêt des conteneurs existants..."
                docker compose $COMPOSE_ARGS down 2>/dev/null || true

                echo "📥 Pull des modifications (branche dev)..."
                git fetch origin dev
                git checkout -f dev
                git reset --hard origin/dev
                echo "✅ Pull réussi"
            fi

            # .env doit exister dans server/ (non versionné)
            if [ ! -f "$REPO_DIR/server/.env" ]; then
                echo "❌ server/.env manquant dans $REPO_DIR — crée-le depuis server/.env.example"
                exit 1
            fi

            # Nettoyage des ressources Docker inutilisées
            echo "🧹 Nettoyage..."
            docker system prune -af 2>/dev/null || true

            # Construction et démarrage avec docker-compose
            echo "🔨 Construction de l'image..."
            docker compose $COMPOSE_ARGS build --no-cache --pull
            echo "🚀 Démarrage des conteneurs..."
            docker compose $COMPOSE_ARGS up -d

            # Migrations (jamais de seed auto — fetch PokeAPI lancé à la main)
            echo "🔄 Migrations base de données..."
            docker compose $COMPOSE_ARGS exec -T adonis-api node ace migration:run --force

            # Attente démarrage API (dev exposé sur 4202)
            echo "🏥 Vérification de la santé (Adonis 4202)..."
            for i in {1..15}; do
                if curl -s http://localhost:4202 > /dev/null 2>&1; then
                    echo "✅ API démarrée"
                    docker compose $COMPOSE_ARGS logs --tail 50 adonis-api || true
                    exit 0
                fi
                echo "   Tentative $i/15..."
                sleep 2
            done
            echo "❌ L'API ne répond pas sur le port 4202"
            docker compose $COMPOSE_ARGS logs --tail 100 adonis-api
            exit 1
