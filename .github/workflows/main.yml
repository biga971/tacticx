name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy_server:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e  # Arrête le script à la première erreur

            BASE_DIR="/home/debian"
            REPO_DIR="$BASE_DIR/tacticx"

            mkdir -p "$BASE_DIR"

            # Vérifier si le dépôt existe, sinon le cloner (branche main)
            if [ ! -d "$REPO_DIR/.git" ]; then
                echo "📦 Premier déploiement - Clonage du dépôt..."
                cd "$BASE_DIR"

                if [ -d "tacticx" ]; then
                    echo "  Dossier existant trouvé, sauvegarde..."
                    mv tacticx tacticx.backup.$(date +%Y%m%d_%H%M%S)
                fi

                git clone --branch main --single-branch git@github.com:biga971/tacticx.git "tacticx"
                cd "$REPO_DIR"
            else
                echo " Dépôt existant trouvé"
                cd "$REPO_DIR"

                echo " Arrêt des conteneurs existants..."
                docker compose down 2>/dev/null || true

                echo "📥 Pull des modifications (branche main)..."
                git fetch origin main
                git checkout -f main
                git reset --hard origin/main
                echo "✅ Pull réussi"
            fi

            # .env doit exister à la racine du repo (non versionné)
            if [ ! -f "$REPO_DIR/server/.env" ]; then
                echo "❌ .env manquant dans $REPO_DIR — crée-le depuis server/.env.example"
                exit 1
            fi

            # Nettoyage des ressources Docker inutilisées
            echo "🧹 Nettoyage..."
            docker system prune -af 2>/dev/null || true

            # Construction et démarrage avec docker-compose
            # --env-file server/.env : interpole ${DB_USER}, etc. (le .env vit dans server/)
            COMPOSE="docker compose --env-file server/.env"

            echo "🔨 Construction de l'image..."
            $COMPOSE build --no-cache --pull
            echo "🚀 Démarrage des conteneurs..."
            $COMPOSE up -d

            # Migrations (jamais de seed auto — fetch PokeAPI lancé à la main)
            echo "🔄 Migrations base de données..."
            $COMPOSE exec -T adonis-api node ace migration:run --force

            # Attente démarrage API (mappé sur 4102 côté hôte)
            echo "🏥 Vérification de la santé (Adonis 4102)..."
            for i in {1..15}; do
                if curl -s http://localhost:4102 > /dev/null 2>&1; then
                    echo "✅ API démarrée"
                    $COMPOSE logs --tail 50 adonis-api || true
                    exit 0
                fi
                echo "   Tentative $i/15..."
                sleep 2
            done
            echo "❌ L'API ne répond pas sur le port 4102"
            $COMPOSE logs --tail 100 adonis-api
            exit 1
