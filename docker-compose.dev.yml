# Root compose — DEV (dev branch). Isolated project + volume + ports from prod.
# Used by the deploy workflow with:
#   docker compose --env-file server/.env -f docker-compose.dev.yml -p tacticx-dev ...
services:
  postgres:
    image: postgres:18.3-alpine3.23
    container_name: tacticx_postgres_dev
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - tacticx_pgdata_dev:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_DATABASE}']
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - '4201:5432'

  adonis-api:
    build:
      context: ./server
      dockerfile: dockerfile
    container_name: tacticx_adonis_api_dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3333
      DB_HOST: postgres
    ports:
      - '4202:3333'

volumes:
  tacticx_pgdata_dev:
