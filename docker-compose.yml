# Root compose — PRODUCTION (main branch).
# Builds the AdonisJS server from ./server and runs Postgres alongside it.
# The mobile app (tacticx/) is an Expo app and is NOT deployed here.
#
# Requires a .env file at the repo root on the VPS (see server/.env.example).
services:
  postgres:
    image: postgres:18.3-alpine3.23
    container_name: tacticx_postgres
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - tacticx_pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_DATABASE}']
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - '4101:5432'

  adonis-api:
    build:
      context: ./server
      dockerfile: dockerfile
    container_name: tacticx_adonis_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3333
      DB_HOST: postgres
    ports:
      - '4102:3333'

volumes:
  tacticx_pgdata:
