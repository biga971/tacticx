services:
  postgres:
    container_name: tacticx_postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
      # DB_PASSWORD is empty in dev; allow passwordless local connections.
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - tacticx_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_DATABASE}']
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: run the API in a container too. Local dev usually uses `node ace serve`.
  adonis-api:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: tacticx_adonis_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3333
      DB_HOST: postgres
    ports:
      - '8080:3333'

volumes:
  tacticx_pgdata:
